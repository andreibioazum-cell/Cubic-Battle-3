name: Build_Cubic_Battle_Windows

on:
  push:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ============================================================
      #  КОМПИЛЯЦИЯ JAVA-МОСТА (ПОЛНЫЙ НАБОР ЗАВИСИМОСТЕЙ)
      # ============================================================
      - name: Compile Java Firebase Bridge
        run: |
          mkdir java_bridge
          cd java_bridge

          @"
          import java.io.*;
          import java.util.*;
          import com.google.firebase.*;
          import com.google.firebase.database.*;

          public class FirebaseBridge {
              private static DatabaseReference ref;

              public static void main(String[] args) throws Exception {
                  FirebaseApp.initializeApp();
                  ref = FirebaseDatabase.getInstance().getReference();
                  System.out.println("[FirebaseBridge] Ready");

                  BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));
                  String line;
                  while ((line = reader.readLine()) != null) {
                      line = line.trim();
                      if (line.startsWith("PUT")) {
                          String[] parts = line.split(" ", 3);
                          if (parts.length == 3) {
                              try {
                                  ref.child(parts[1]).setValue(parts[2]);
                                  System.out.println("OK");
                              } catch (Exception e) {
                                  System.out.println("ERROR: " + e.getMessage());
                              }
                          }
                      } else if (line.startsWith("GET")) {
                          String[] parts = line.split(" ", 2);
                          if (parts.length == 2) {
                              try {
                                  ref.child(parts[1]).addListenerForSingleValueEvent(new ValueEventListener() {
                                      public void onDataChange(DataSnapshot snapshot) {
                                          System.out.println("DATA: " + snapshot.getValue());
                                      }
                                      public void onCancelled(DatabaseError error) {
                                          System.out.println("ERROR: " + error.getMessage());
                                      }
                                  });
                              } catch (Exception e) {
                                  System.out.println("ERROR: " + e.getMessage());
                              }
                          }
                      } else if (line.startsWith("DELETE")) {
                          String[] parts = line.split(" ", 2);
                          if (parts.length == 2) {
                              try {
                                  ref.child(parts[1]).removeValue();
                                  System.out.println("OK");
                              } catch (Exception e) {
                                  System.out.println("ERROR: " + e.getMessage());
                              }
                          }
                      } else if (line.equals("EXIT")) {
                          break;
                      }
                  }
                  System.exit(0);
              }
          }
          "@ | Out-File -Encoding utf8 FirebaseBridge.java

          mkdir libs
          cd libs
          curl -L -o firebase-admin.jar https://repo1.maven.org/maven2/com/google/firebase/firebase-admin/9.2.0/firebase-admin-9.2.0.jar
          curl -L -o google-auth.jar https://repo1.maven.org/maven2/com/google/auth/google-auth-library-oauth2-http/1.22.0/google-auth-library-oauth2-http-1.22.0.jar
          curl -L -o google-http-gson.jar https://repo1.maven.org/maven2/com/google/http-client/google-http-client-gson/1.43.3/google-http-client-gson-1.43.3.jar
          curl -L -o google-http.jar https://repo1.maven.org/maven2/com/google/http-client/google-http-client/1.43.3/google-http-client-1.43.3.jar
          curl -L -o google-api-client.jar https://repo1.maven.org/maven2/com/google/api-client/google-api-client/2.2.0/google-api-client-2.2.0.jar
          curl -L -o api-common.jar https://repo1.maven.org/maven2/com/google/api/api-common/2.2.0/api-common-2.2.0.jar
          curl -L -o google-api-core.jar https://repo1.maven.org/maven2/com/google/api/api-common/2.2.0/api-common-2.2.0.jar
          curl -L -o guava.jar https://repo1.maven.org/maven2/com/google/guava/guava/31.1-jre/guava-31.1-jre.jar
          curl -L -o gson.jar https://repo1.maven.org/maven2/com/google/code/gson/gson/2.9.0/gson-2.9.0.jar
          cd ..

          # Компилируем
          javac -cp "libs/*;." FirebaseBridge.java

          # Создаём JAR
          jar cf firebase-bridge.jar FirebaseBridge.class

          # Копируем JAR и все зависимости в корень (для запуска)
          cd ..
          mkdir -p dist\CubicBattle
          copy java_bridge\firebase-bridge.jar dist\CubicBattle\
          copy java_bridge\libs\*.jar dist\CubicBattle\

      # ============================================================
      #  СБОРКА EXE
      # ============================================================
      - name: Package game.love
        run: |
          powershell Compress-Archive -Path * -DestinationPath game.zip -Force
          ren game.zip game.love

      - name: Download LÖVE Windows 64-bit
        run: |
          curl -L -o love-windows.zip https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip
          Expand-Archive -Path love-windows.zip -DestinationPath love-windows

      - name: Create Portable EXE (64-bit)
        run: |
          New-Item -ItemType Directory -Force -Path dist\CubicBattle
          Copy-Item love-windows\love-11.5-win64\* -Destination dist\CubicBattle\
          cmd /c copy /b dist\CubicBattle\love.exe + game.love dist\CubicBattle\CubicBattle.exe
          Remove-Item dist\CubicBattle\love.exe

      - name: Create run.bat
        run: |
          @"
          @echo off
          start /b java -jar firebase-bridge.jar
          timeout /t 1 /nobreak >nul
          CubicBattle.exe
          "@ | Out-File -Encoding ascii dist\CubicBattle\run.bat

      - name: Upload Portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_Windows
          path: dist\CubicBattle
