name: Build_Cubic_Battle_Windows

on:
  push:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Package game.love
        run: |
          powershell Compress-Archive -Path * -DestinationPath game.zip -Force
          ren game.zip game.love

      - name: Download LÖVE Windows 64-bit
        run: |
          curl -L -o love-windows.zip https://github.com/love2d/love/releases/download/12.0/love-12.0-win64.zip
          Expand-Archive -Path love-windows.zip -DestinationPath love-windows

      - name: Copy LuaSocket and SSL modules
        run: |
          mkdir -p dist\CubicBattle\socket
          mkdir -p dist\CubicBattle\ssl
          mkdir -p dist\CubicBattle\mime
          
          # Копируем LuaSocket (уже есть в LOVE)
          copy love-windows\love-12.0-win64\socket\*.lua dist\CubicBattle\socket\ 2>nul || echo "No socket lua files"
          
          # Копируем SSL модули (уже есть в LOVE)
          copy love-windows\love-12.0-win64\ssl\*.lua dist\CubicBattle\ssl\ 2>nul || echo "No ssl lua files"
          
          # Копируем DLL
          copy love-windows\love-12.0-win64\*.dll dist\CubicBattle\ 2>nul || echo "No dll files"

      - name: Create Portable EXE (64-bit)
        run: |
          New-Item -ItemType Directory -Force -Path dist\CubicBattle
          Copy-Item love-windows\love-12.0-win64\* -Destination dist\CubicBattle\
          cmd /c copy /b dist\CubicBattle\love.exe + game.love dist\CubicBattle\CubicBattle.exe
          Remove-Item dist\CubicBattle\love.exe

      - name: Upload Portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_Windows_12.0
          path: dist\CubicBattle
