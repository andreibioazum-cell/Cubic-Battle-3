name: Build_Cubic_Battle_Windows

on:
  push:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compile Java Firebase Bridge
        run: |
          mkdir java_bridge
          cd java_bridge
          @"
          import java.io.*;
          import java.net.*;
          import java.nio.charset.StandardCharsets;

          public class FirebaseBridge {
              private static final String DB_URL = "https://cubic-battle-3-default-rtdb.firebaseio.com/";

              public static void main(String[] args) throws Exception {
                  System.out.println("[FirebaseBridge] Ready (REST API)");
                  BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));
                  String line;
                  while ((line = reader.readLine()) != null) {
                      line = line.trim();
                      if (line.startsWith("PUT")) {
                          String[] parts = line.split(" ", 3);
                          if (parts.length == 3) {
                              String url = DB_URL + parts[1] + ".json";
                              String response = sendRequest("PUT", url, parts[2]);
                              System.out.println(response.contains("error") ? "ERROR: " + response : "OK");
                          }
                      } else if (line.startsWith("GET")) {
                          String[] parts = line.split(" ", 2);
                          if (parts.length == 2) {
                              String url = DB_URL + parts[1] + ".json";
                              String response = sendRequest("GET", url, null);
                              System.out.println(response);
                          }
                      } else if (line.startsWith("DELETE")) {
                          String[] parts = line.split(" ", 2);
                          if (parts.length == 2) {
                              String url = DB_URL + parts[1] + ".json";
                              String response = sendRequest("DELETE", url, null);
                              System.out.println(response.contains("error") ? "ERROR: " + response : "OK");
                          }
                      } else if (line.equals("EXIT")) {
                          break;
                      }
                  }
                  System.exit(0);
              }

              private static String sendRequest(String method, String urlString, String body) throws Exception {
                  HttpURLConnection conn = (HttpURLConnection) new URL(urlString).openConnection();
                  conn.setRequestMethod(method);
                  conn.setRequestProperty("Content-Type", "application/json");
                  conn.setConnectTimeout(5000);
                  conn.setReadTimeout(5000);
                  if (body != null) {
                      conn.setDoOutput(true);
                      try (OutputStream os = conn.getOutputStream()) {
                          os.write(body.getBytes(StandardCharsets.UTF_8));
                      }
                  }
                  int code = conn.getResponseCode();
                  InputStream is = code >= 200 && code < 300 ? conn.getInputStream() : conn.getErrorStream();
                  BufferedReader reader = new BufferedReader(new InputStreamReader(is, StandardCharsets.UTF_8));
                  StringBuilder response = new StringBuilder();
                  String line;
                  while ((line = reader.readLine()) != null) {
                      response.append(line);
                  }
                  conn.disconnect();
                  if (code >= 200 && code < 300) {
                      return response.toString();
                  } else {
                      return "{\"error\":\"HTTP " + code + "\",\"body\":\"" + response.toString() + "\"}";
                  }
              }
          }
          "@ | Out-File -Encoding utf8 FirebaseBridge.java
          javac FirebaseBridge.java
          jar cf firebase-bridge.jar FirebaseBridge.class

      - name: Package game.love
        run: |
          powershell Compress-Archive -Path * -DestinationPath game.zip -Force
          ren game.zip game.love

      - name: Download LÖVE Windows 64-bit
        run: |
          curl -L -o love-windows.zip https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip
          Expand-Archive -Path love-windows.zip -DestinationPath love-windows

      - name: Create Portable EXE (64-bit)
        run: |
          New-Item -ItemType Directory -Force -Path dist\CubicBattle
          Copy-Item love-windows\love-11.5-win64\* -Destination dist\CubicBattle\
          cmd /c copy /b dist\CubicBattle\love.exe + game.love dist\CubicBattle\CubicBattle.exe
          Remove-Item dist\CubicBattle\love.exe
          copy java_bridge\firebase-bridge.jar dist\CubicBattle\

      - name: Create run.bat
        run: |
          @"
          @echo off
          start /b java -jar firebase-bridge.jar
          timeout /t 1 /nobreak >nul
          CubicBattle.exe
          "@ | Out-File -Encoding ascii dist\CubicBattle\run.bat

      - name: Upload Portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_Windows
          path: dist\CubicBattle
