name: Build Cubic Battle Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Package game.love
        run: |
          7z a -tzip game.zip * -r -x!".git/*" -x!".github/*"
          ren game.zip game.love

      - name: Download LÖVE Windows 64-bit (12.0)
        run: |
          curl -L -o love-windows.zip https://github.com/love2d/love/releases/download/12.0/love-12.0-win64.zip
          7z x love-windows.zip -olove-windows

      - name: Create Portable EXE (64-bit)
        run: |
          mkdir dist\CubicBattle
          copy love-windows\* dist\CubicBattle\
          copy /b dist\CubicBattle\love.exe + game.love dist\CubicBattle\CubicBattle.exe
          del dist\CubicBattle\love.exe

      - name: Upload Portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_Windows
          path: dist\CubicBattle
