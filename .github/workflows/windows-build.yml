name: Build_Cubic_Battle_Windows

on:
  push:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Package game.love
        run: |
          powershell Compress-Archive -Path * -DestinationPath game.zip -Force
          ren game.zip game.love

      - name: Download LÖVE Windows 64-bit
        run: |
          curl -L -o love-windows.zip https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip
          Expand-Archive -Path love-windows.zip -DestinationPath love-windows

      - name: Create Portable EXE
        run: |
          mkdir dist\CubicBattle
          copy love-windows\love-11.5-win64\* dist\CubicBattle\
          copy /b dist\CubicBattle\love.exe + game.love dist\CubicBattle\CubicBattle.exe
          del dist\CubicBattle\love.exe

      - name: Download Enigma Virtual Box (console)
        run: |
          curl -L -o evb.zip https://enigmaprotector.com/assets/files/enigmavb.exe
          # Enigma Virtual Box — это установщик, но есть консольная утилита
          # Я использую готовый портабельный вариант из репозитория
          curl -L -o evb.zip https://github.com/andrewsun/EnigmaVB/releases/download/1.0/EnigmaVB.zip
          Expand-Archive -Path evb.zip -DestinationPath evb

      - name: Pack into single EXE
        run: |
          # Создаём конфиг для EnigmaVB
          @"
          [Files]
          Source = dist\CubicBattle\CubicBattle.exe
          Destination = CubicBattle.exe
          [Dependencies]
          Source = dist\CubicBattle\*.dll
          Destination = .
          "@ | Out-File -Encoding utf8 enigma.ini

          # Запускаем упаковку (если есть консольная версия)
          # Если нет, то просто создаём ZIP с портативной папкой
          cd dist
          powershell Compress-Archive -Path CubicBattle\* -DestinationPath CubicBattle_Portable.zip

      - name: Upload Portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_Portable
          path: dist\CubicBattle_Portable.zip
