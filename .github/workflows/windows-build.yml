name: Build_Cubic_Battle_Windows

on:
  push:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 15
    outputs:
      exe-name: ${{ steps.set-output.outputs.exe-name }}

    steps:
      - uses: actions/checkout@v4
        with:
          path: game

      - name: Package game.love
        run: |
          $gameDir = Join-Path $env:GITHUB_WORKSPACE "game"
          $loveFile = Join-Path $env:GITHUB_WORKSPACE "game.love"
          Compress-Archive -Path "$gameDir\*" -DestinationPath $loveFile -CompressionLevel Optimal -Force
        shell: pwsh

      - name: Download LÖVE 64-bit
        run: |
          curl -L -o love-windows.zip https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip
          Expand-Archive -Path love-windows.zip -DestinationPath love-windows
        shell: pwsh

      - name: Download LÖVE 32-bit
        run: |
          curl -L -o love-windows32.zip https://github.com/love2d/love/releases/download/11.5/love-11.5-win32.zip
          Expand-Archive -Path love-windows32.zip -DestinationPath love-windows32
        shell: pwsh

      - name: Create Portable EXE (64-bit)
        run: |
          New-Item -ItemType Directory -Force -Path dist\CubicBattle
          Copy-Item -Path love-windows\love-11.5-win64\* -Destination dist\CubicBattle\ -Recurse
          cmd /c copy /b dist\CubicBattle\love.exe + game.love dist\CubicBattle\CubicBattle.exe
        shell: pwsh

      - name: Create Portable EXE (32-bit)
        run: |
          New-Item -ItemType Directory -Force -Path dist\CubicBattle32
          Copy-Item -Path love-windows32\love-11.5-win32\* -Destination dist\CubicBattle32\ -Recurse
          cmd /c copy /b dist\CubicBattle32\love.exe + game.love dist\CubicBattle32\CubicBattle32.exe
        shell: pwsh

      - name: Download rcedit
        run: |
          curl -L -o rcedit-x64.exe https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe
        shell: pwsh

      # ----- Установка иконки с проверкой -----
      - name: Set icon for 64-bit EXE
        run: |
          $iconPath = "game\icon.ico"
          if (Test-Path $iconPath) {
            $bytes = [System.IO.File]::ReadAllBytes($iconPath)
            if ($bytes[0] -eq 0 -and $bytes[1] -eq 0 -and $bytes[2] -eq 1 -and $bytes[3] -eq 0) {
              .\rcedit-x64.exe dist\CubicBattle\CubicBattle.exe --set-icon $iconPath
            } else {
              Write-Warning "Файл $iconPath не является корректным ICO, пропускаем установку иконки."
            }
          }
        shell: pwsh
        continue-on-error: true   # на всякий случай, чтобы сборка не упала

      - name: Set icon for 32-bit EXE
        run: |
          $iconPath = "game\icon.ico"
          if (Test-Path $iconPath) {
            $bytes = [System.IO.File]::ReadAllBytes($iconPath)
            if ($bytes[0] -eq 0 -and $bytes[1] -eq 0 -and $bytes[2] -eq 1 -and $bytes[3] -eq 0) {
              .\rcedit-x64.exe dist\CubicBattle32\CubicBattle32.exe --set-icon $iconPath
            } else {
              Write-Warning "Файл $iconPath не является корректным ICO, пропускаем установку иконки."
            }
          }
        shell: pwsh
        continue-on-error: true

      - name: Create ZIP archive
        run: |
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "CubicBattle_Windows_Portable.zip"
          Compress-Archive -Path dist\CubicBattle, dist\CubicBattle32 -DestinationPath $zipPath -CompressionLevel Optimal -Force
        shell: pwsh

      - name: Set EXE name
        id: set-output
        run: |
          $date = Get-Date -Format 'yyyyMMdd_HHmm'
          $newName = "CubicBattle_Windows_$date.zip"
          Move-Item CubicBattle_Windows_Portable.zip $newName
          echo "exe-name=$newName" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_Windows
          path: CubicBattle_Windows_*.zip
          compression-level: 0
