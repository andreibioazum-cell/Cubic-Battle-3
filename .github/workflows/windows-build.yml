name: Build_Cubic_Battle_Windows

on:
  push:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest              # ← изменено на Windows
    timeout-minutes: 15
    outputs:
      exe-name: ${{ steps.set-output.outputs.exe-name }}

    steps:
      - uses: actions/checkout@v4
        with:
          path: game

      # Упаковка game.love через PowerShell
      - name: Package game.love
        run: |
          cd game
          powershell -Command "Compress-Archive -Path * -DestinationPath ../game.love -CompressionLevel Optimal -Force"

      # Скачивание LÖVE для Windows (64-bit)
      - name: Download LÖVE Windows 64-bit
        run: |
          curl -L -o love-windows.zip "https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip"
          unzip love-windows.zip -d love-windows

      # Скачивание LÖVE для Windows (32-bit)
      - name: Download LÖVE Windows 32-bit
        run: |
          curl -L -o love-windows32.zip "https://github.com/love2d/love/releases/download/11.5/love-11.5-win32.zip"
          unzip love-windows32.zip -d love-windows32

      # Создание портативного EXE (64-bit)
      - name: Create Portable EXE (64-bit)
        run: |
          mkdir -p dist/CubicBattle
          cp love-windows/love-11.5-win64/* dist/CubicBattle/
          cat game.love >> dist/CubicBattle/love.exe
          mv dist/CubicBattle/love.exe dist/CubicBattle/CubicBattle.exe

      # Создание портативного EXE (32-bit)
      - name: Create Portable EXE (32-bit)
        run: |
          mkdir -p dist/CubicBattle32
          cp love-windows32/love-11.5-win32/* dist/CubicBattle32/
          cat game.love >> dist/CubicBattle32/love.exe
          mv dist/CubicBattle32/love.exe dist/CubicBattle32/CubicBattle32.exe

      # Скачиваем rcedit (утилита для замены иконки)
      - name: Download rcedit
        run: |
          curl -L -o rcedit-x64.exe https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe

      # Устанавливаем иконку для 64-bit EXE (если есть icon.ico)
      - name: Set icon for 64-bit EXE
        run: |
          if (Test-Path "game/icon.ico") {
            .\rcedit-x64.exe dist/CubicBattle/CubicBattle.exe --set-icon game/icon.ico
          }
        shell: pwsh

      # Устанавливаем иконку для 32-bit EXE
      - name: Set icon for 32-bit EXE
        run: |
          if (Test-Path "game/icon.ico") {
            .\rcedit-x64.exe dist/CubicBattle32/CubicBattle32.exe --set-icon game/icon.ico
          }
        shell: pwsh

      # Упаковываем в ZIP через PowerShell
      - name: Create ZIP
        run: |
          powershell -Command "Compress-Archive -Path dist/CubicBattle, dist/CubicBattle32 -DestinationPath CubicBattle_Windows_Portable.zip -CompressionLevel Optimal -Force"

      # Задаём имя артефакта с датой
      - name: Set EXE name
        id: set-output
        run: |
          $EXE_NAME = "CubicBattle_Windows_$(Get-Date -Format 'yyyyMMdd_HHmm').zip"
          Move-Item CubicBattle_Windows_Portable.zip $EXE_NAME
          echo "exe-name=$EXE_NAME" >> $env:GITHUB_OUTPUT
        shell: pwsh

      # Загружаем артефакт
      - uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_Windows
          path: CubicBattle_Windows_*.zip
          compression-level: 0
