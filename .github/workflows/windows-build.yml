name: Build CB3 Nightly (Love2D 12.0)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Скачать свежую сборку Love2D 12.0 (из ночных артефактов)
        run: |
          curl -L -o love-windows.zip https://nightly.link/love2d/love/workflows/build/master/love-windows-x86_64.zip
          7z x love-windows.zip -olove-windows

      - name: Упаковать игру в game.love
        run: |
          7z a -tzip game.zip * -r -x!".git/*" -x!".github/*" -x!"love-windows/*"
          ren game.zip game.love

      - name: Собрать портативный EXE
        run: |
          mkdir dist\CubicBattle
          copy love-windows\* dist\CubicBattle\
          copy /b dist\CubicBattle\love.exe + game.love dist\CubicBattle\CubicBattle.exe
          del dist\CubicBattle\love.exe

      - name: Загрузить артефакт
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_12.0
          path: dist\CubicBattle
