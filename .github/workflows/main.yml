name: Build_Cubic_Battle_FULL

on:
  push:
  workflow_dispatch:

jobs:
  # ============================================================
  # JOB 1: СБОРКА APK (Android)
  # ============================================================
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      apk-name: ${{ steps.set-output.outputs.apk-name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: game

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        id: ndk-cache
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653-v5

      - name: Install NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: yes | sdkmanager "ndk;25.2.9519653"

      - name: Export NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - uses: actions/cache@v4
        id: love-android-cache
        with:
          path: love-android
          key: love-android-src-v6

      - name: Clone love-android
        if: steps.love-android-cache.outputs.cache-hit != 'true'
        run: git clone --recursive --depth 1 https://github.com/love2d/love-android.git

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            love-android/app/.cxx
            love-android/app/build
          key: gradle-native-v6

      - name: Package game.love
        run: |
          cd game
          zip -9 -r ../game.love . -x "*.git*" -x ".github/*"

      - name: Embed game
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      - name: Force arm64
        run: |
          sed -i '/abiFilters/d' love-android/app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' love-android/app/build.gradle

      - name: Optimize Gradle
        run: |
          cat >> love-android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=false
          org.gradle.workers.max=4
          android.enableJetifier=true
          android.useAndroidX=true
          EOF

      - name: Build APK
        working-directory: love-android
        run: ./gradlew assembleEmbedNoRecordDebug --no-daemon --parallel --max-workers=4 --build-cache --quiet

      - name: Collect APK
        id: set-output
        run: |
          APK=$(find love-android -name "*.apk" | head -1)
          APK_NAME="CubicBattle_$(date +'%Y%m%d_%H%M').apk"
          cp "$APK" "$APK_NAME"
          echo "apk-name=$APK_NAME" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_APK
          path: CubicBattle_*.apk
          compression-level: 0
          if-no-files-found: error

  # ============================================================
  # JOB 2: СБОРКА EXE (Windows) — ОПТИМИЗИРОВАНА
  # ============================================================
  build-windows:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      exe-name: ${{ steps.set-output.outputs.exe-name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: game

      # Кэшируем скачанные ZIP-архивы LÖVE (чтобы не качать каждый раз)
      - name: Cache LÖVE downloads
        id: cache-love
        uses: actions/cache@v4
        with:
          path: love-cache
          key: love-11.5-win64-v2

      - name: Download LÖVE (64-bit)
        if: steps.cache-love.outputs.cache-hit != 'true'
        run: |
          mkdir -p love-cache
          wget -O love-cache/love-11.5-win64.zip "https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip"

      - name: Extract LÖVE (64-bit)
        run: |
          mkdir -p love-windows
          unzip -q love-cache/love-11.5-win64.zip -d love-windows

      - name: Package game.love
        run: |
          cd game
          zip -9 -r ../game.love . -x "*.git*" -x ".github/*"

      - name: Create Portable EXE
        run: |
          mkdir -p dist
          cp -r love-windows/love-11.5-win64/* dist/
          cat game.love >> dist/love.exe
          mv dist/love.exe dist/CubicBattle.exe
          # Копируем иконку, если есть
          cp game/icon.ico dist/ || true

      - name: Create ZIP
        run: |
          cd dist
          zip -9 -r ../CubicBattle_Windows.zip CubicBattle.exe love.dll* SDL2.dll* OpenAL32.dll* license.txt readme.txt 2>/dev/null || true
          cd ..
          # Убедимся, что архив не пустой
          if [ ! -f CubicBattle_Windows.zip ]; then
            echo "No files to archive, creating empty archive" && touch empty.txt && zip CubicBattle_Windows.zip empty.txt
          fi

      - name: Set output name
        id: set-output
        run: |
          EXE_NAME="CubicBattle_Windows_$(date +'%Y%m%d_%H%M').zip"
          mv CubicBattle_Windows.zip "$EXE_NAME"
          echo "exe-name=$EXE_NAME" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_Windows
          path: CubicBattle_Windows_*.zip
          compression-level: 0
          if-no-files-found: error

  # ============================================================
  # JOB 3: ЗАГРУЗКА В RELEASE (опционально)
  # ============================================================
  release:
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/CubicBattle_APK/CubicBattle_*.apk
            artifacts/CubicBattle_Windows/CubicBattle_Windows_*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
