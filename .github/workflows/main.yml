name: Build Cubic Battle (ULTRA FAST)

on:
  push:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # запас времени, но обычно 10-12 минут
    outputs:
      apk-name: ${{ steps.set-output.outputs.apk-name }}

    steps:
      # 1. Быстрый checkout (без истории)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: game

      # 2. Настройка Java (кэш для Gradle)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Настройка Android SDK
      - uses: android-actions/setup-android@v3

      # 4. Кэш NDK (ключ фиксированный, т.к. версия не меняется)
      - uses: actions/cache@v4
        id: ndk-cache
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653-v5

      - name: Install NDK (если нет в кэше)
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          yes | sdkmanager "ndk;25.2.9519653"

      - name: Export NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      # 5. Кэш для love-android (исходники)
      - uses: actions/cache@v4
        id: love-android-cache
        with:
          path: love-android
          key: love-android-src-v6   # обновить при изменении версии LÖVE

      - name: Clone love-android (если нет кэша)
        if: steps.love-android-cache.outputs.cache-hit != 'true'
        run: |
          git clone --recursive --depth 1 https://github.com/love2d/love-android.git

      # 6. Кэш для Gradle и C++ сборок (огромное ускорение)
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            love-android/app/.cxx
            love-android/app/build
          key: gradle-native-v6

      # 7. Упаковка game.love (быстро)
      - name: Package game.love
        run: |
          cd game
          zip -9 -r ../game.love . -x "*.git*" -x ".github/*"

      # 8. Встраивание в APK
      - name: Embed game
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      # 9. Принудительная arm64 (уже есть, но оставим)
      - name: Force arm64
        run: |
          sed -i '/abiFilters/d' love-android/app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' love-android/app/build.gradle

      # 10. Максимальная оптимизация Gradle
      - name: Optimize Gradle
        run: |
          cat >> love-android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=false
          org.gradle.workers.max=4
          android.enableJetifier=true
          android.useAndroidX=true
          EOF

      # 11. Сборка APK с максимальной параллельностью и без лишнего вывода
      - name: Build APK
        working-directory: love-android
        run: |
          ./gradlew assembleEmbedNoRecordDebug \
            --no-daemon \
            --parallel \
            --max-workers=4 \
            --build-cache \
            --quiet   # тише, быстрее

      # 12. Поиск и переименование APK
      - name: Collect APK
        id: set-output
        run: |
          APK=$(find love-android -name "*.apk" | head -1)
          APK_NAME="CubicBattle_$(date +'%Y%m%d_%H%M').apk"
          cp "$APK" "$APK_NAME"
          echo "apk-name=$APK_NAME" >> $GITHUB_OUTPUT

      # 13. Загрузка артефакта (без сжатия — быстрее)
      - uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_APK
          path: CubicBattle_*.apk
          compression-level: 0
          if-no-files-found: error
