name: Build_Cubic_Battle_FULL

on:
  push:
  workflow_dispatch:

jobs:
  # ============================================================
  # JOB 1: СБОРКА APK (Android)
  # ============================================================
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      apk-name: ${{ steps.set-output.outputs.apk-name }}

    steps:
      - uses: actions/checkout@v4
        with:
          path: game

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653-v5

      - name: Install NDK
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/25.2.9519653" ]; then
            yes | sdkmanager "ndk;25.2.9519653"
          fi

      - name: Export NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-src-v5

      - name: Clone love-android
        run: |
          if [ ! -f "love-android/gradlew" ]; then
            git clone --recursive --depth 1 https://github.com/love2d/love-android.git
          fi

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v5

      - uses: actions/cache@v4
        with:
          path: |
            love-android/app/.cxx
            love-android/app/build
          key: native-v5

      - name: Package game.love
        run: |
          cd game
          zip -9 -r ../game.love . -x "*.git*" -x ".github/*"

      - name: Embed game
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      - name: Force arm64
        run: |
          sed -i '/abiFilters/d' love-android/app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' love-android/app/build.gradle

      - name: Optimize Gradle
        run: |
          cat >> love-android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=false
          EOF

      - name: Build APK
        working-directory: love-android
        run: ./gradlew assembleEmbedNoRecordDebug --no-daemon --parallel --console=plain

      - name: Collect APK
        id: set-output
        run: |
          APK=$(find love-android -name "*.apk" | head -1)
          APK_NAME="CubicBattle_$(date +'%Y%m%d_%H%M').apk"
          cp "$APK" "$APK_NAME"
          echo "apk-name=$APK_NAME" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_APK
          path: CubicBattle_*.apk
          compression-level: 0

  # ============================================================
  # JOB 2: СБОРКА EXE (Windows)
  # ============================================================
  build-windows:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      exe-name: ${{ steps.set-output.outputs.exe-name }}

    steps:
      - uses: actions/checkout@v4
        with:
          path: game

      - name: Package game.love
        run: |
          cd game
          zip -9 -r ../game.love . -x "*.git*" -x ".github/*"

      - name: Download LÖVE Windows
        run: |
          wget -O love-windows.zip "https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip"
          unzip love-windows.zip -d love-windows

      - name: Download LÖVE Windows 32-bit
        run: |
          wget -O love-windows32.zip "https://github.com/love2d/love/releases/download/11.5/love-11.5-win32.zip"
          unzip love-windows32.zip -d love-windows32

      - name: Create Portable EXE (64-bit)
        run: |
          mkdir -p dist/CubicBattle
          cp love-windows/love-11.5-win64/* dist/CubicBattle/
          cat game.love >> dist/CubicBattle/love.exe
          mv dist/CubicBattle/love.exe dist/CubicBattle/CubicBattle.exe
          cp game/icon.ico dist/CubicBattle/ || true

      - name: Create Portable EXE (32-bit)
        run: |
          mkdir -p dist/CubicBattle32
          cp love-windows32/love-11.5-win32/* dist/CubicBattle32/
          cat game.love >> dist/CubicBattle32/love.exe
          mv dist/CubicBattle32/love.exe dist/CubicBattle32/CubicBattle32.exe

      - name: Create ZIP
        run: |
          cd dist
          zip -9 -r ../CubicBattle_Windows_Portable.zip CubicBattle/ CubicBattle32/

      - name: Set EXE name
        id: set-output
        run: |
          EXE_NAME="CubicBattle_Windows_$(date +'%Y%m%d_%H%M').zip"
          mv CubicBattle_Windows_Portable.zip "$EXE_NAME"
          echo "exe-name=$EXE_NAME" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_Windows
          path: CubicBattle_Windows_*.zip
          compression-level: 0

  # ============================================================
  # JOB 3: ЗАГРУЗКА В RELEASE (опционально)
  # ============================================================
  release:
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/CubicBattle_APK/CubicBattle_*.apk
            artifacts/CubicBattle_Windows/CubicBattle_Windows_*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
