name: Build_Cubic_Battle_Android_Debug

on:
  push:
  workflow_dispatch:

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      apk-name: ${{ steps.set-output.outputs.apk-name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653-v5

      - name: Install NDK
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/25.2.9519653" ]; then
            yes | sdkmanager "ndk;25.2.9519653"
          fi

      - name: Export NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-src-v5

      - name: Clone love-android
        run: |
          if [ ! -f "love-android/gradlew" ]; then
            git clone --recursive --depth 1 https://github.com/love2d/love-android.git
          fi

      # ============================================================
      #  КОМПИЛЯЦИЯ JAVA-МОСТА (ВСЁ ВНУТРИ YML)
      # ============================================================
      - name: Compile Java Firebase Bridge
        run: |
          mkdir -p java_bridge
          cd java_bridge

          # Создаём Java-файл прямо в раннере
          cat > FirebaseBridge.java << 'EOF'
          import java.io.*;
          import java.util.*;
          import com.google.firebase.*;
          import com.google.firebase.database.*;

          public class FirebaseBridge {
              private static DatabaseReference ref;

              public static void main(String[] args) throws Exception {
                  FirebaseApp.initializeApp();
                  ref = FirebaseDatabase.getInstance().getReference();
                  System.out.println("[FirebaseBridge] Ready");
                  BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));
                  String line;
                  while ((line = reader.readLine()) != null) {
                      if (line.startsWith("PUT")) {
                          String[] parts = line.split(" ", 3);
                          if (parts.length == 3) {
                              ref.child(parts[1]).setValueAsync(parts[2]);
                              System.out.println("OK");
                          }
                      } else if (line.startsWith("GET")) {
                          String[] parts = line.split(" ", 2);
                          if (parts.length == 2) {
                              ref.child(parts[1]).addListenerForSingleValueEvent(new ValueEventListener() {
                                  public void onDataChange(DataSnapshot snapshot) {
                                      System.out.println("DATA: " + snapshot.getValue());
                                  }
                                  public void onCancelled(DatabaseError error) {
                                      System.out.println("ERROR: " + error.getMessage());
                                  }
                              });
                          }
                      } else if (line.startsWith("DELETE")) {
                          String[] parts = line.split(" ", 2);
                          if (parts.length == 2) {
                              ref.child(parts[1]).removeValueAsync();
                              System.out.println("OK");
                          }
                      } else if (line.equals("EXIT")) {
                          break;
                      }
                  }
                  System.exit(0);
              }
          }
          EOF

          # Скачиваем Firebase SDK через Maven
          mkdir -p libs
          cd libs
          wget -q https://repo1.maven.org/maven2/com/google/firebase/firebase-admin/9.2.0/firebase-admin-9.2.0.jar
          wget -q https://repo1.maven.org/maven2/com/google/auth/google-auth-library-oauth2-http/1.22.0/google-auth-library-oauth2-http-1.22.0.jar
          wget -q https://repo1.maven.org/maven2/com/google/http-client/google-http-client-gson/1.43.3/google-http-client-gson-1.43.3.jar
          wget -q https://repo1.maven.org/maven2/com/google/http-client/google-http-client/1.43.3/google-http-client-1.43.3.jar
          cd ..

          # Компилируем Java
          javac -cp "libs/*:." FirebaseBridge.java

          # Создаём JAR
          jar cf firebase-bridge.jar FirebaseBridge.class

          # Копируем JAR в assets APK
          mkdir -p ../love-android/app/src/main/assets
          cp firebase-bridge.jar ../love-android/app/src/main/assets/

      # ============================================================
      #  ОСТАЛЬНАЯ СБОРКА (OpenSSL, love-android, APK)
      # ============================================================
      - name: Cache OpenSSL
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: love-android/app/src/main/cpp/openssl
          key: openssl-arm64-${{ hashFiles('love-android/openssl-1.1.1w.tar.gz') }}

      - name: Download OpenSSL sources
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          cd love-android
          wget -O openssl-1.1.1w.tar.gz https://www.openssl.org/source/openssl-1.1.1w.tar.gz

      - name: Build OpenSSL for Android (arm64)
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          cd love-android
          tar -xzf openssl-1.1.1w.tar.gz
          cd openssl-1.1.1w
          export ANDROID_NDK_ROOT="$ANDROID_HOME/ndk/25.2.9519653"
          export PATH="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          export CC=clang
          export AR=ar
          ./Configure android-arm64 -D__ANDROID_API__=21 -no-shared -no-asm
          make -j$(nproc)
          mkdir -p ../app/src/main/cpp/openssl/include
          mkdir -p ../app/src/main/cpp/openssl/lib/arm64-v8a
          cp -r include/openssl ../app/src/main/cpp/openssl/include/
          cp libcrypto.a libssl.a ../app/src/main/cpp/openssl/lib/arm64-v8a/
          cd ..

      - name: Enable SSL in love-android
        run: |
          cd love-android
          if ! grep -q "WITH_SSL" app/src/main/cpp/CMakeLists.txt; then
            cat >> app/src/main/cpp/CMakeLists.txt << 'EOF'

          # OpenSSL
          set(OPENSSL_ROOT_DIR ${CMAKE_CURRENT_SOURCE_DIR}/openssl)
          set(OPENSSL_INCLUDE_DIR ${OPENSSL_ROOT_DIR}/include)
          set(OPENSSL_LIB_DIR ${OPENSSL_ROOT_DIR}/lib/${ANDROID_ABI})
          add_library(crypto STATIC IMPORTED)
          set_target_properties(crypto PROPERTIES IMPORTED_LOCATION ${OPENSSL_LIB_DIR}/libcrypto.a)
          add_library(ssl STATIC IMPORTED)
          set_target_properties(ssl PROPERTIES IMPORTED_LOCATION ${OPENSSL_LIB_DIR}/libssl.a)
          target_link_libraries(love crypto ssl)
          option(WITH_SSL "Build with SSL support" ON)
          EOF
          fi

      - name: Set package name to com.CB3
        run: |
          sed -i 's/applicationId "org.love2d.android"/applicationId "com.CB3"/g' love-android/app/build.gradle

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v5

      - uses: actions/cache@v4
        with:
          path: |
            love-android/app/.cxx
            love-android/app/build
          key: native-v5

      - name: Package game.love
        run: |
          zip -9 -r game.love . -x "*.git*" -x ".github/*" -x "love-android/*" -x "*.yml"

      - name: Embed game
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      - name: Force arm64
        run: |
          sed -i '/abiFilters/d' love-android/app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' love-android/app/build.gradle

      - name: Optimize Gradle
        run: |
          cat >> love-android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=false
          EOF

      - name: Build Debug APK
        working-directory: love-android
        run: ./gradlew assembleEmbedNoRecordDebug --no-daemon --parallel --console=plain

      - name: Collect APK
        id: set-output
        run: |
          APK=$(find love-android -name "*.apk" | head -1)
          APK_NAME="CubicBattle3_Debug_$(date +'%Y%m%d_%H%M').apk"
          cp "$APK" "$APK_NAME"
          echo "apk-name=$APK_NAME" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: CubicBattle3_Debug_APK
          path: CubicBattle3_Debug_*.apk
          compression-level: 0
