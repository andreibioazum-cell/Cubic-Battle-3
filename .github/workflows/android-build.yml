name: Build_Cubic_Battle_Android_Release

on:
  push:
  workflow_dispatch:

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      aab-name: ${{ steps.set-output.outputs.aab-name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK (no emulator)
        run: |
          mkdir -p /usr/local/lib/android/sdk
          cd /usr/local/lib/android/sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          export PATH=$PATH:/usr/local/lib/android/sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-33" "build-tools;33.0.0"

      - name: Export Android Home
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653-v5

      - name: Install NDK
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/25.2.9519653" ]; then
            yes | sdkmanager "ndk;25.2.9519653"
          fi

      - name: Export NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-src-v5

      - name: Clone love-android
        run: |
          if [ ! -f "love-android/gradlew" ]; then
            git clone --recursive --depth 1 https://github.com/love2d/love-android.git
          fi

      - name: Compile Java Firebase Bridge
        run: |
          mkdir -p java_bridge
          cd java_bridge
          cat > FirebaseBridge.java << 'EOF'
          import java.io.*;
          import java.net.*;
          import java.nio.charset.StandardCharsets;

          public class FirebaseBridge {
              private static final String DB_URL = "https://cubic-battle-3-default-rtdb.firebaseio.com/";

              public static void main(String[] args) throws Exception {
                  System.out.println("[FirebaseBridge] Ready (REST API)");
                  BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));
                  String line;
                  while ((line = reader.readLine()) != null) {
                      line = line.trim();
                      if (line.startsWith("PUT")) {
                          String[] parts = line.split(" ", 3);
                          if (parts.length == 3) {
                              String url = DB_URL + parts[1] + ".json";
                              String response = sendRequest("PUT", url, parts[2]);
                              System.out.println(response.contains("error") ? "ERROR: " + response : "OK");
                          }
                      } else if (line.startsWith("GET")) {
                          String[] parts = line.split(" ", 2);
                          if (parts.length == 2) {
                              String url = DB_URL + parts[1] + ".json";
                              String response = sendRequest("GET", url, null);
                              System.out.println(response);
                          }
                      } else if (line.startsWith("DELETE")) {
                          String[] parts = line.split(" ", 2);
                          if (parts.length == 2) {
                              String url = DB_URL + parts[1] + ".json";
                              String response = sendRequest("DELETE", url, null);
                              System.out.println(response.contains("error") ? "ERROR: " + response : "OK");
                          }
                      } else if (line.equals("EXIT")) {
                          break;
                      }
                  }
                  System.exit(0);
              }

              private static String sendRequest(String method, String urlString, String body) throws Exception {
                  HttpURLConnection conn = (HttpURLConnection) new URL(urlString).openConnection();
                  conn.setRequestMethod(method);
                  conn.setRequestProperty("Content-Type", "application/json");
                  conn.setConnectTimeout(5000);
                  conn.setReadTimeout(5000);
                  if (body != null) {
                      conn.setDoOutput(true);
                      try (OutputStream os = conn.getOutputStream()) {
                          os.write(body.getBytes(StandardCharsets.UTF_8));
                      }
                  }
                  int code = conn.getResponseCode();
                  InputStream is = code >= 200 && code < 300 ? conn.getInputStream() : conn.getErrorStream();
                  BufferedReader reader = new BufferedReader(new InputStreamReader(is, StandardCharsets.UTF_8));
                  StringBuilder response = new StringBuilder();
                  String line;
                  while ((line = reader.readLine()) != null) {
                      response.append(line);
                  }
                  conn.disconnect();
                  if (code >= 200 && code < 300) {
                      return response.toString();
                  } else {
                      return "{\"error\": \"HTTP " + code + "\", \"body\": " + response.toString() + "}";
                  }
              }
          }
          EOF
          javac FirebaseBridge.java
          jar cf firebase-bridge.jar FirebaseBridge.class
          mkdir -p ../love-android/app/src/main/assets
          cp firebase-bridge.jar ../love-android/app/src/main/assets/

      - name: Set package name to com.CB3
        run: |
          sed -i 's/applicationId "org.love2d.android"/applicationId "com.CB3"/g' love-android/app/build.gradle

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v5

      - uses: actions/cache@v4
        with:
          path: |
            love-android/app/.cxx
            love-android/app/build
          key: native-v5

      - name: Package game.love
        run: |
          zip -9 -r game.love . -x "*.git*" -x ".github/*" -x "love-android/*" -x "*.yml"

      - name: Embed game
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      - name: Force arm64
        run: |
          sed -i '/abiFilters/d' love-android/app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' love-android/app/build.gradle

      - name: Optimize Gradle
        run: |
          cat >> love-android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=false
          EOF

      # ============================================================
      #  СБОРКА AAB (ВМЕСТО APK)
      # ============================================================
      - name: Build Release AAB
        working-directory: love-android
        run: ./gradlew bundleEmbedNoRecordRelease --no-daemon --parallel --console=plain

      - name: Collect AAB
        id: set-output
        run: |
          AAB=$(find love-android -name "*.aab" | head -1)
          AAB_NAME="CubicBattle3_$(date +'%Y%m%d_%H%M').aab"
          cp "$AAB" "$AAB_NAME"
          echo "aab-name=$AAB_NAME" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: CubicBattle3_AAB
          path: CubicBattle3_*.aab
          compression-level: 0
