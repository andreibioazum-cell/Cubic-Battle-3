name: Build_Cubic_Battle_Android

on:
  push:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          mkdir -p /usr/local/lib/android/sdk
          cd /usr/local/lib/android/sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          export PATH=$PATH:/usr/local/lib/android/sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-33" "build-tools;33.0.0"

      - name: Set Android environment
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653-v5

      - name: Install NDK
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/25.2.9519653" ]; then
            yes | sdkmanager "ndk;25.2.9519653"
          fi

      - name: Export NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Cache love-android
        uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-src-v5

      - name: Clone love-android
        run: |
          if [ ! -f "love-android/gradlew" ]; then
            git clone --recursive --depth 1 https://github.com/love2d/love-android.git
          fi

      # ============================================================
      #  СОЗДАНИЕ JAVA-КЛАССА
      # ============================================================
      - name: Create Java Firebase class
        run: |
          mkdir -p love-android/app/src/main/java/com/CB3
          cat > love-android/app/src/main/java/com/CB3/FirebaseBridge.java << 'EOF'
          package com.CB3;

          import android.util.Log;
          import java.io.*;
          import java.net.*;
          import java.nio.charset.StandardCharsets;

          public class FirebaseBridge {
              private static final String DB_URL = "https://cubic-battle-3-default-rtdb.firebaseio.com/";

              public static String sendRequest(String method, String path, String body) {
                  try {
                      String url = DB_URL + path + ".json";
                      HttpURLConnection conn = (HttpURLConnection) new URL(url).openConnection();
                      conn.setRequestMethod(method);
                      conn.setRequestProperty("Content-Type", "application/json");
                      conn.setConnectTimeout(5000);
                      conn.setReadTimeout(5000);

                      if (body != null && !body.isEmpty()) {
                          conn.setDoOutput(true);
                          try (OutputStream os = conn.getOutputStream()) {
                              os.write(body.getBytes(StandardCharsets.UTF_8));
                          }
                      }

                      int code = conn.getResponseCode();
                      InputStream is = (code >= 200 && code < 300) ? conn.getInputStream() : conn.getErrorStream();
                      BufferedReader reader = new BufferedReader(new InputStreamReader(is, StandardCharsets.UTF_8));
                      StringBuilder response = new StringBuilder();
                      String line;
                      while ((line = reader.readLine()) != null) {
                          response.append(line);
                      }
                      conn.disconnect();

                      if (code >= 200 && code < 300) {
                          return response.toString();
                      } else {
                          return "{\"error\":\"HTTP " + code + "\",\"body\":\"" + response.toString() + "\"}";
                      }
                  } catch (Exception e) {
                      return "{\"error\":\"" + e.getMessage() + "\"}";
                  }
              }
          }
          EOF

      # ============================================================
      #  ВСТРАИВАЕМ JNI В СУЩЕСТВУЮЩИЙ CMakeLists.txt
      # ============================================================
      - name: Embed JNI into love-android CMake
        run: |
          cd love-android
          # Добавляем наш JNI-код в существующий CMakeLists.txt
          cat >> app/src/main/cpp/CMakeLists.txt << 'EOF'

          # Firebase JNI Bridge
          add_library(firebase_bridge STATIC
              firebase_jni.cpp
          )
          target_link_libraries(love firebase_bridge)
          EOF

          # Создаём JNI-файл в правильной папке
          mkdir -p app/src/main/cpp
          cat > app/src/main/cpp/firebase_jni.cpp << 'EOF'
          #include <jni.h>
          #include <string>
          #include <android/log.h>

          #define LOG_TAG "FirebaseJNI"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)

          extern "C" {

          static jclass firebaseClass = nullptr;
          static jmethodID sendRequestMethod = nullptr;

          JNIEXPORT jstring JNICALL
          Java_com_CB3_FirebaseBridge_sendRequest(JNIEnv *env, jobject thiz,
                                                   jstring method, jstring path, jstring body) {
              if (firebaseClass == nullptr) {
                  jclass cls = env->FindClass("com/CB3/FirebaseBridge");
                  if (cls == nullptr) {
                      LOGI("Failed to find FirebaseBridge class");
                      return env->NewStringUTF("{\"error\":\"Class not found\"}");
                  }
                  firebaseClass = (jclass)env->NewGlobalRef(cls);
                  sendRequestMethod = env->GetStaticMethodID(firebaseClass, "sendRequest",
                      "(Ljava/lang/String;Ljava/lang/String;Ljava/lang/String;)Ljava/lang/String;");
                  if (sendRequestMethod == nullptr) {
                      LOGI("Failed to find sendRequest method");
                      return env->NewStringUTF("{\"error\":\"Method not found\"}");
                  }
              }

              jstring result = (jstring)env->CallStaticObjectMethod(firebaseClass, sendRequestMethod, method, path, body);
              if (result == nullptr) {
                  return env->NewStringUTF("{\"error\":\"Java method returned null\"}");
              }

              return result;
          }

          }
          EOF

      - name: Set package name and app name
        run: |
          sed -i 's/applicationId "org.love2d.android"/applicationId "com.CB3"/g' love-android/app/build.gradle
          mkdir -p love-android/app/src/main/res/values
          cat > love-android/app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">Cubic Battle 3</string>
          </resources>
          EOF

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v5

      - name: Cache native
        uses: actions/cache@v4
        with:
          path: |
            love-android/app/.cxx
            love-android/app/build
          key: native-v5

      - name: Package game.love
        run: |
          zip -9 -r game.love . -x "*.git*" -x ".github/*" -x "love-android/*" -x "*.yml"

      - name: Embed game
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      - name: Force arm64 only
        run: |
          sed -i '/abiFilters/d' love-android/app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' love-android/app/build.gradle

      - name: Optimize Gradle
        run: |
          cat >> love-android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=false
          EOF

      - name: Build APK
        working-directory: love-android
        run: ./gradlew assembleEmbedNoRecordDebug --no-daemon --parallel --console=plain

      - name: Rename APK to "Cubic Battle 3.apk"
        run: |
          APK_FILE=$(find love-android -name "*.apk" | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "No APK found!"
            exit 1
          fi
          NEW_NAME="Cubic Battle 3.apk"
          cp "$APK_FILE" "$NEW_NAME"
          echo "APK_NAME=$NEW_NAME" >> $GITHUB_ENV
          echo "✅ APK created: $NEW_NAME"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Cubic_Battle_3_APK
          path: "Cubic Battle 3.apk"
          compression-level: 0
