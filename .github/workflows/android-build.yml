name: Build_Cubic_Battle_Android_Release

on:
  push:
  workflow_dispatch:

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      apk-name: ${{ steps.set-output.outputs.apk-name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653-v5

      - name: Install NDK
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/25.2.9519653" ]; then
            yes | sdkmanager "ndk;25.2.9519653"
          fi

      - name: Export NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-src-v5

      - name: Clone love-android
        run: |
          if [ ! -f "love-android/gradlew" ]; then
            git clone --recursive --depth 1 https://github.com/love2d/love-android.git
          fi

      # Меняем пакет на com.CB3
      - name: Set package name to com.CB3
        run: |
          sed -i 's/applicationId "org.love2d.android"/applicationId "com.CB3"/g' love-android/app/build.gradle

      # Декодируем keystore из секрета
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      # Настраиваем подпись релизной сборки
      - name: Configure signing
        run: |
          cd love-android/app
          cat > signing.gradle << 'EOF'
          android.signingConfigs {
              release {
                  storeFile file("../../keystore.jks")
                  storePassword "${{ secrets.KEYSTORE_PASSWORD }}"
                  keyAlias "${{ secrets.KEY_ALIAS }}"
                  keyPassword "${{ secrets.KEY_PASSWORD }}"
              }
          }
          android.buildTypes {
              release {
                  signingConfig android.signingConfigs.release
              }
          }
          EOF
          echo "apply from: 'signing.gradle'" >> build.gradle

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v5

      - uses: actions/cache@v4
        with:
          path: |
            love-android/app/.cxx
            love-android/app/build
          key: native-v5

      - name: Package game.love
        run: |
          zip -9 -r game.love . -x "*.git*" -x ".github/*" -x "love-android/*" -x "*.yml"

      - name: Embed game
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      - name: Force arm64
        run: |
          sed -i '/abiFilters/d' love-android/app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' love-android/app/build.gradle

      - name: Optimize Gradle
        run: |
          cat >> love-android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=false
          EOF

      - name: Build Release APK
        working-directory: love-android
        run: ./gradlew assembleEmbedNoRecordRelease --no-daemon --parallel --console=plain

      - name: Collect APK
        id: set-output
        run: |
          APK=$(find love-android -name "*.apk" | head -1)
          APK_NAME="CubicBattle3_$(date +'%Y%m%d_%H%M').apk"
          cp "$APK" "$APK_NAME"
          echo "apk-name=$APK_NAME" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: CubicBattle3_APK
          path: CubicBattle3_*.apk
          compression-level: 0
