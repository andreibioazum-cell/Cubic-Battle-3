name: Build_Cubic_Battle_Android_Debug

on:
  push:
  workflow_dispatch:

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      apk-name: ${{ steps.set-output.outputs.apk-name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653-v5

      - name: Install NDK
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/25.2.9519653" ]; then
            yes | sdkmanager "ndk;25.2.9519653"
          fi

      - name: Export NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-src-v5

      - name: Clone love-android
        run: |
          if [ ! -f "love-android/gradlew" ]; then
            git clone --recursive --depth 1 https://github.com/love2d/love-android.git
          fi

      # ============================================================
      #  СБОРКА OPENSSL ДЛЯ ARM64
      # ============================================================
      - name: Build OpenSSL for Android (arm64)
        run: |
          cd love-android
          wget -O openssl-1.1.1w.tar.gz https://www.openssl.org/source/openssl-1.1.1w.tar.gz
          tar -xzf openssl-1.1.1w.tar.gz
          cd openssl-1.1.1w
          export ANDROID_NDK_ROOT="$ANDROID_HOME/ndk/25.2.9519653"
          export PATH="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          export CC=clang
          export AR=ar
          ./Configure android-arm64 -D__ANDROID_API__=21 -no-shared -no-asm
          make -j$(nproc)
          mkdir -p ../app/src/main/cpp/openssl/include
          mkdir -p ../app/src/main/cpp/openssl/lib/arm64-v8a
          cp -r include/openssl ../app/src/main/cpp/openssl/include/
          cp libcrypto.a libssl.a ../app/src/main/cpp/openssl/lib/arm64-v8a/
          cd ..

      # ============================================================
      #  ВКЛЮЧАЕМ SSL В LOVE-ANDROID
      # ============================================================
      - name: Enable SSL in love-android
        run: |
          cd love-android
          cat >> app/src/main/cpp/CMakeLists.txt << 'EOF'

          # Добавляем OpenSSL
          set(OPENSSL_ROOT_DIR ${CMAKE_CURRENT_SOURCE_DIR}/openssl)
          set(OPENSSL_INCLUDE_DIR ${OPENSSL_ROOT_DIR}/include)
          set(OPENSSL_LIB_DIR ${OPENSSL_ROOT_DIR}/lib/${ANDROID_ABI})
          add_library(crypto STATIC IMPORTED)
          set_target_properties(crypto PROPERTIES IMPORTED_LOCATION ${OPENSSL_LIB_DIR}/libcrypto.a)
          add_library(ssl STATIC IMPORTED)
          set_target_properties(ssl PROPERTIES IMPORTED_LOCATION ${OPENSSL_LIB_DIR}/libssl.a)
          target_link_libraries(love crypto ssl)
          option(WITH_SSL "Build with SSL support" ON)
          EOF

      - name: Set package name to com.CB3
        run: |
          sed -i 's/applicationId "org.love2d.android"/applicationId "com.CB3"/g' love-android/app/build.gradle

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v5

      - uses: actions/cache@v4
        with:
          path: |
            love-android/app/.cxx
            love-android/app/build
          key: native-v5

      - name: Package game.love
        run: |
          zip -9 -r game.love . -x "*.git*" -x ".github/*" -x "love-android/*" -x "*.yml"

      - name: Embed game
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love

      - name: Force arm64
        run: |
          sed -i '/abiFilters/d' love-android/app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' love-android/app/build.gradle

      - name: Optimize Gradle
        run: |
          cat >> love-android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=false
          EOF

      - name: Build Debug APK
        working-directory: love-android
        run: ./gradlew assembleEmbedNoRecordDebug --no-daemon --parallel --console=plain

      - name: Collect APK
        id: set-output
        run: |
          APK=$(find love-android -name "*.apk" | head -1)
          APK_NAME="CubicBattle3_Debug_$(date +'%Y%m%d_%H%M').apk"
          cp "$APK" "$APK_NAME"
          echo "apk-name=$APK_NAME" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: CubicBattle3_Debug_APK
          path: CubicBattle3_Debug_*.apk
          compression-level: 0
